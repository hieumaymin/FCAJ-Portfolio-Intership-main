<style type="text/css">
  .ghContributors {
    display: flex;
    flex-flow: wrap;
    align-content: flex-start;
  }

  .ghContributors > div {
    width: 50%;
    display: inline-flex;
    margin-bottom: 5px;
  }
  .ghContributors > div label {
    padding-left: 4px;
  }
  .ghContributors > div span {
    font-size: x-small;
    padding-left: 4px;
  }
</style>

<div class="ghContributors">
  {{ $url := .Get 0 }}

  {{ $opts := dict "headers" (dict "User-Agent" "Hugo") }}
  {{ $res := resources.GetRemote $url $opts }}

  {{ if $res }}
    {{ $data := $res | transform.Unmarshal }}

    {{ range $data }}
    <div>
      <img
        src="{{.avatar_url}}"
        class="inline"
        width="32"
        height="32"
        style="
          height: 32px;
          margin-bottom: 0.25em;
          vertical-align: middle;
        "
      />
      <label><a href="{{.html_url}}">@{{.login}}</a></label>
      <span class="contributions">{{.contributions}} commits</span>
    </div>
    {{ end }}

  {{ else }}
    <p>Không load được contributors</p>
  {{ end }}
</div>
